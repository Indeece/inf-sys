spring:
  application:
    name: inf-sys

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: public
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true

  config:
    activate:
      on-profile: docker

  data:
    redis:
      host: redis
      port: 6379

  datasource:
    url: jdbc:postgresql://postgres:5432/infsys
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: always
      continue-on-error: true
      data-locations: classpath:data.sql

server:
  port: 8081