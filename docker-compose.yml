services:
  inf-sys:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: inf-sys
    ports:
      - "8081:8081"
    depends_on:
      - redis
      - postgres
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/infsys
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    networks:
      - indeece-net
  redis:
    image: redis:latest
    container_name: inf-sys-redis
    ports:
      - "6379:6379"
    networks:
      - indeece-net

  postgres:
    image: postgres:15-alpine
    container_name: inf-sys-postgres
    environment:
      POSTGRES_DB: infsys
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - indeece-net

volumes:
  pgdata:

networks:
  indeece-net:
    driver: bridge